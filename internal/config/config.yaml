service:
  name: submission-triage

http:
  port: ${HTTP_PORT}
  read_timeout_seconds: ${HTTP_READ_TIMEOUT_SECONDS}
  write_timeout_seconds: ${HTTP_WRITE_TIMEOUT_SECONDS}
  shutdown_timeout_seconds: ${HTTP_SHUTDOWN_TIMEOUT_SECONDS}

database:
  path: ${DB_PATH}

log:
  level: ${LOG_LEVEL}
  format: ${LOG_FORMAT}
  directory: ${LOG_DIR}
  max_age_days: ${LOG_MAX_AGE_DAYS}
  rotation_hours: ${LOG_ROTATION_HOURS}

postmark:
  server_token: ${POSTMARK_SERVER_TOKEN}
  from_address: ${POSTMARK_FROM_ADDRESS}
  from_name: ${POSTMARK_FROM_NAME}
  webhook_secret: ${POSTMARK_WEBHOOK_SECRET}
  webhook_signature_secret: ${POSTMARK_WEBHOOK_SIGNATURE_SECRET}

anthropic:
  api_key: ${ANTHROPIC_API_KEY}
  model: ${ANTHROPIC_MODEL}
  timeout_seconds: ${ANTHROPIC_TIMEOUT_SECONDS}
  max_tokens: ${ANTHROPIC_MAX_TOKENS}

checklists:
  directory: ${CHECKLISTS_DIR}

escalation:
  interval_minutes: ${ESCALATION_INTERVAL_MINUTES}
  threshold_hours: ${ESCALATION_THRESHOLD_HOURS}
  auto_close_after_hours: ${ESCALATION_AUTO_CLOSE_AFTER_HOURS}
  digest_interval_hours: ${ESCALATION_DIGEST_INTERVAL_HOURS}
  digest_recipient: ${ESCALATION_DIGEST_RECIPIENT}

retry:
  attempts: ${RETRY_ATTEMPTS}
  base_delay_ms: ${RETRY_BASE_DELAY_MS}

reply:
  workers: ${REPLY_WORKERS}
  queue_size: ${REPLY_QUEUE_SIZE}
