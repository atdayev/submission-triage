name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      # golangci-lint also runs govet + staticcheck + errcheck, so they aren't
      # separate steps. install-mode goinstall compiles the linter from source
      # with this job's Go toolchain, so it can analyze a module whose go
      # directive is newer than a prebuilt release's build Go.
      - name: lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall

      - name: build
        run: go build ./...

      - name: test (race)
        run: go test -race -count=1 ./...

  deploy:
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: cross-compile linux/amd64
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o server-linux-amd64 ./cmd/server

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: submission-triage

      # ship the binary, swap it in atomically (keep .bak), restart, confirm active
      - name: deploy to VM
        run: |
          gcloud compute scp server-linux-amd64 Admin@submission-triage:/tmp/st-new \
            --zone us-central1-a --quiet
          gcloud compute ssh Admin@submission-triage --zone us-central1-a --quiet --command '
            set -e
            sudo install -m 0755 /tmp/st-new /opt/submission-triage/submission-triage.new
            sudo cp -p /opt/submission-triage/submission-triage /opt/submission-triage/submission-triage.bak
            sudo systemctl stop submission-triage
            sudo mv /opt/submission-triage/submission-triage.new /opt/submission-triage/submission-triage
            sudo systemctl start submission-triage
            rm -f /tmp/st-new
            sleep 2
            systemctl is-active submission-triage'
